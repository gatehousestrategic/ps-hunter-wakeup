<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prime Source Lead Hunter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, #0d1b2e 0%, #1B2B4B 60%, #1e3560 100%);
}
.box {
  text-align: center;
  max-width: 380px;
  padding: 40px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.logo {
  height: 48px;
  object-fit: contain;
  margin-bottom: 12px;
}
.divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #C8922A, transparent);
  margin: 0 auto 10px;
}
.label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #C8922A;
  margin-bottom: 40px;
}
.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: #C8922A;
  border-radius: 50%;
  margin: 0 auto 20px;
  animation: spin 0.85s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.message {
  font-size: 15px;
  font-weight: 500;
  color: #fff;
  margin-bottom: 8px;
}
.submessage {
  font-size: 13px;
  color: #6B7A99;
  line-height: 1.5;
}
.dots span {
  animation: blink 1.4s infinite both;
  color: #C8922A;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100% { opacity:0 } 40% { opacity:1 } }
</style>
</head>
<body>
<div class="box">
  <img
    class="logo"
    src="https://primesourcex.com/wp-content/uploads/2024/02/hybrid-horizontal-logo-2.png"
    alt="Prime Source Expense Experts"
    onerror="this.style.display='none'"
  >
  <div class="divider"></div>
  <div class="label">Lead Hunter</div>

  <div class="spinner"></div>
  <div class="message">
    Waking up the system<span class="dots"><span>.</span><span>.</span><span>.</span></span>
  </div>
  <div class="submessage">
    Just a moment — this happens after a period of inactivity.
  </div>
</div>

<script>
(function () {
  var APP_URL = 'https://ps-hunter.onrender.com';
  var target = APP_URL + window.location.pathname + window.location.search + window.location.hash;
  var RETRY_INTERVAL_MS = 3000;
  var TIMEOUT_MS = 5000;

  function redirectNow() {
    window.location.replace(target);
  }

  function ping() {
    var controller = new AbortController();
    var timer = setTimeout(function () { controller.abort(); }, TIMEOUT_MS);

    fetch(APP_URL + '/api/health', { signal: controller.signal, cache: 'no-store' })
      .then(function (res) {
        clearTimeout(timer);
        if (res.ok) {
          redirectNow();
        } else {
          setTimeout(ping, RETRY_INTERVAL_MS);
        }
      })
      .catch(function () {
        clearTimeout(timer);
        setTimeout(ping, RETRY_INTERVAL_MS);
      });
  }

  // First attempt after a short delay so the page renders first
  setTimeout(ping, 500);
})();
</script>
</body>
</html>
