<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prime Source Lead Hunter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, #0d1b2e 0%, #1B2B4B 60%, #1e3560 100%);
}
.box {
  text-align: center;
  max-width: 380px;
  padding: 40px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
.logo {
  height: 48px;
  object-fit: contain;
  margin-bottom: 12px;
}
.divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #C8922A, transparent);
  margin: 0 auto 10px;
}
.label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #C8922A;
  margin-bottom: 40px;
}
#loading { display: none; }
.spinner-wrap {
  margin-bottom: 20px;
}
.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: #C8922A;
  border-radius: 50%;
  margin: 0 auto;
  animation: spin 0.85s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.message {
  font-size: 15px;
  font-weight: 500;
  color: #fff;
  margin-bottom: 8px;
}
.submessage {
  font-size: 13px;
  color: #6B7A99;
  line-height: 1.5;
}
.dots span {
  animation: blink 1.4s infinite both;
  color: #C8922A;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100% { opacity:0 } 40% { opacity:1 } }
</style>
</head>
<body>
<div class="box">
  <img
    class="logo"
    src="https://primesourcex.com/wp-content/uploads/2024/02/hybrid-horizontal-logo-2.png"
    alt="Prime Source Expense Experts"
    onerror="this.style.display='none'"
  >
  <div class="divider"></div>
  <div class="label">Lead Hunter</div>

  <div id="loading">
    <div class="spinner-wrap">
      <div class="spinner"></div>
    </div>
    <div class="message">
      Waking up the system<span class="dots"><span>.</span><span>.</span><span>.</span></span>
    </div>
    <div class="submessage">
      Just a moment — this happens after a period of inactivity.
    </div>
  </div>
</div>

<script>
(function () {
  var APP_URL = 'https://ps-hunter.onrender.com';
  var target = APP_URL + window.location.pathname + window.location.search + window.location.hash;
  var loadingEl = document.getElementById('loading');
  var coldStartShown = false;
  var FAST_TIMEOUT_MS = 1500;
  var RETRY_INTERVAL_MS = 2500;

  function showLoadingScreen() {
    if (!coldStartShown) {
      coldStartShown = true;
      loadingEl.style.display = 'block';
    }
  }

  function redirectNow() {
    window.location.replace(target);
  }

  function ping(onSuccess, onFail) {
    var controller = new AbortController();
    var timedOut = false;
    var timer = setTimeout(function () {
      timedOut = true;
      controller.abort();
    }, FAST_TIMEOUT_MS);

    fetch(APP_URL + '/api/health', { signal: controller.signal, cache: 'no-store' })
      .then(function (res) {
        clearTimeout(timer);
        if (res.ok) { onSuccess(); } else { onFail(); }
      })
      .catch(function () {
        clearTimeout(timer);
        onFail();
      });
  }

  function pollUntilWarm() {
    ping(redirectNow, function () {
      showLoadingScreen();
      setTimeout(pollUntilWarm, RETRY_INTERVAL_MS);
    });
  }

  pollUntilWarm();
})();
</script>
</body>
</html>
